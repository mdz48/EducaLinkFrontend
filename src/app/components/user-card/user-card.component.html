<main>
    <section class="flex flex-col items-center justify-center cursor-pointer bg-white rounded-lg p-4" (click)="goProfile()">
        <img [src]="user.profile_image_url || 'assets/placeholders/avatar.svg'" (error)="$any($event.target).src='assets/placeholders/avatar.svg'" alt="Profile Picture" class="w-14 h-14 rounded-full">
        <h2 class="text-2xl font-bold">{{ user.name }}</h2>
        <p class="text-gray-500">{{ user.education_level }} - {{ user.grade }}</p>
    </section>
</main>
