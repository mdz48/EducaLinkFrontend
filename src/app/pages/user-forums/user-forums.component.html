<app-navbar></app-navbar>
<main class="flex justify-center md:mt-4">
    <section class="bg-white w-full flex justify-center md:w-1/2 md:rounded-lg md:p-4">
        <div class="w-[90%] flex flex-col gap-5">
            <div class="flex items-center justify-between gap-3">
                <h1 class="text-2xl font-bold">Grupos</h1>
                <button
                    type="button"
                    (click)="goBack()"
                    class="rounded-full bg-[#3F008F] px-4 py-2 text-white font-semibold hover:bg-[#6e2ec2] transition-colors"
                >
                    Volver
                </button>
            </div>
            <div *ngFor="let forum of forums" class="">
                <app-group-item [forum]="forum" [creatorForum]="forum.creator"></app-group-item>
            </div>
        </div>
    </section>
</main>
